name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build image
        run: |
          docker build \
            --build-arg FRONTEND_GOOGLE_CLIENT_ID=${{ secrets.FRONTEND_GOOGLE_CLIENT_ID }} \
            --build-arg FRONTEND_BACKEND_API_URL=${{ secrets.FRONTEND_BACKEND_API_URL }} \
            -t wincorn/tm-fe:${{ github.sha }} .

      - name: Push image
        run: |
          docker push wincorn/tm-fe:${{ github.sha }}

      - name: Clone infra repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/ThangNgo123/tm-infra.git

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update frontend image tag
        run: |
          cd tm-infra
          yq -i '.fe.image.tag = env(GITHUB_SHA)' values.yaml

      - name: Commit and push
        run: |
          cd tm-infra

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .
          git commit -m "update frontend image"

          git push
